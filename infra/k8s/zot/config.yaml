mountConfig: true
configFiles:
  config.json: |-
    {
      "distSpecVersion": "1.1.1",
      "log": {
        "level": "debug"
      },
      "storage": {
        "rootDirectory": "/var/lib/registry"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "tls": {
          "cert": "/etc/zot/tls/tls.crt",
          "key": "/etc/zot/tls/tls.key"
        }
      },
      "extensions": {
        "ui": { "enable": true },
        "search": { "enable": true },
        "sync": {
          "enable": true,
          "registries": [
            {
              "urls": ["https://registry-1.docker.io"],
              "onDemand": true,
              "tlsVerify": true
            }
          ]
        }
      }
    }

extraVolumes:
  - name: tls
    secret:
      secretName: zot-tls-secret
extraVolumeMounts:
  - name: tls
    mountPath: /etc/zot/tls
    readOnly: true

httpGet:
  scheme: HTTPS

service:
  type: ClusterIP
  clusterIP: 10.96.163.253
